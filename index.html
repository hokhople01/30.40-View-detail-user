<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Update User</title>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        input,
        select {
            margin-bottom: 10px;
            padding: 6px;
            width: 250px;
        }

        button {
            padding: 8px 12px;
            margin-right: 10px;
        }
    </style>

</head>

<body>

    <h2>Chi tiết User</h2>

    <form id="userForm">

        <input type="text" id="firstName" placeholder="First name"><br>
        <input type="text" id="lastName" placeholder="Last name"><br>
        <input type="text" id="subject" placeholder="Subject"><br>

        <select id="country">
            <option value="VN">Việt Nam</option>
            <option value="USA">USA</option>
            <option value="AUS">Australia</option>
            <option value="CAN">Canada</option>
        </select><br>

        <select id="customerType">
            <option value="Standard">Standard</option>
            <option value="Gold">Gold</option>
            <option value="Premium">Premium</option>
        </select><br>

        <select id="registerStatus">
            <option value="New">New</option>
            <option value="Accepted">Accepted</option>
            <option value="Denied">Denied</option>
        </select><br>

        <button type="button" id="updateBtn">Update user</button>
        <button type="button" id="cancelBtn">Hủy</button>

    </form>

    <script>

        // 🔹 CONFIG API
        const API_URL = "https://drive.google.com/uc?id=1Pfj0RqmIoCOIqPmAnC3E7BI-ClmkAfr-";

        // 🔹 Lấy id từ URL
        function getId() {
            let params = new URLSearchParams(window.location.search);
            return params.get("id");
        }

        let userId = getId();

        // 🔹 Load dữ liệu user
        function loadUser() {

            $.ajax({
                url: API_URL,
                method: "GET",
                success: function (data) {

                    // data là mảng users
                    let user = data.find(u => u.id == userId);

                    if (!user) {
                        alert("Không tìm thấy user");
                        return;
                    }

                    $("#firstName").val(user.firstName);
                    $("#lastName").val(user.lastName);
                    $("#subject").val(user.subject);

                    $("#country").val(user.country);
                    $("#customerType").val(user.customerType);
                    $("#registerStatus").val(user.registerStatus);
                }
            });
        }

        // 🔹 Update user
        $("#updateBtn").click(function () {

            let updatedUser = {
                id: userId,
                firstName: $("#firstName").val(),
                lastName: $("#lastName").val(),
                subject: $("#subject").val(),
                country: $("#country").val(),
                customerType: $("#customerType").val(),
                registerStatus: $("#registerStatus").val()
            };

            console.log("User update:", updatedUser);

            // ⚠️ Vì API từ Google Drive là READ-ONLY
            // => giả lập update (in ra console)

            alert("Update thành công ");

            // quay lại list
            window.location.href = "users.html";
        });

        // 🔹 Hủy
        $("#cancelBtn").click(function () {
            window.location.href = "users.html";
        });

        // 🔹 Run
        $(document).ready(function () {
            loadUser();
        });

    </script>

</body>

</html>
