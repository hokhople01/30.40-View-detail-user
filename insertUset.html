<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Insert User</title>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        input,
        select {
            margin-bottom: 10px;
            padding: 6px;
            width: 250px;
        }

        button {
            padding: 8px 12px;
            margin-right: 10px;
        }
    </style>
</head>

<body>

    <h2>Thêm User mới</h2>

    <form id="insertForm">

        <input type="text" id="firstName" placeholder="First name"><br>
        <input type="text" id="lastName" placeholder="Last name"><br>
        <input type="text" id="subject" placeholder="Subject"><br>

        <select id="country">
            <option value="VN">Việt Nam</option>
            <option value="USA">USA</option>
            <option value="AUS">Australia</option>
            <option value="CAN">Canada</option>
        </select><br>

        <select id="customerType">
            <option value="Standard">Standard</option>
            <option value="Gold">Gold</option>
            <option value="Premium">Premium</option>
        </select><br>

        <select id="registerStatus">
            <option value="New">New</option>
            <option value="Accepted">Accepted</option>
            <option value="Denied">Denied</option>
        </select><br>

        <button type="button" id="insertBtn">Thêm mới</button>
        <button type="button" id="cancelBtn">Hủy</button>

    </form>

    <script>
        // 🔹 CONFIG API
        const API_URL = "https://drive.google.com/uc?id=1Pfj0RqmIoCOIqPmAnC3E7BI-ClmkAfr-";

        // 🔹 Validate dữ liệu
        function validateUser(user) {
            if (!user.firstName || !user.lastName || !user.subject) {
                alert("Vui lòng nhập đầy đủ thông tin!");
                return false;
            }
            return true;
        }

        // 🔹 Thêm mới user
        $("#insertBtn").click(function () {

            let newUser = {
                firstName: $("#firstName").val(),
                lastName: $("#lastName").val(),
                subject: $("#subject").val(),
                country: $("#country").val(),
                customerType: $("#customerType").val(),
                registerStatus: $("#registerStatus").val()
            };

            if (!validateUser(newUser)) return;

            console.log("User insert:", newUser);

            // ⚠️ API Google Drive chỉ READ-ONLY
            // => giả lập gọi ajax post
            $.ajax({
                url: API_URL,
                method: "POST",
                data: JSON.stringify(newUser),
                success: function (response) {
                    alert("Thêm user thành công (giả lập)");
                    console.log("Response:", response);

                    // quay lại danh sách
                    window.location.href = "users.html";
                },
                error: function () {
                    alert("Thêm user thất bại (giả lập)");
                }
            });
        });

        // 🔹 Hủy
        $("#cancelBtn").click(function () {
            window.location.href = "users.html";
        });
    </script>

</body>

</html>
